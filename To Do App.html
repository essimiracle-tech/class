<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>To Do App</title>
    <style>
        *{
            box-sizing: border-box;
            margin: 0%;
            padding: 0;
        }
        body{
            margin:0%;
            display: flex;
            padding: 0%;
            background: #f3f4f6;
            justify-content: center;
            padding: 50px,15px;
            font-family: Arial, Helvetica, sans-serif;
        }
        .container{
            border-radius: 10px;
            background: white;
            width: 100%;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.07);
            padding: 25px;
            max-width: 500px;
        }
        h1{
            text-align: center;
            margin-top: 0;
        }
        .group-input{
            gap: 10px;
            display: flex;
        }
        input{
            font-size: small;
            flex: 1;
            border-radius: 5px;
            border: 1px solid #ccc;
            padding: 15px;
        }
        button{
            border: none;
            cursor: pointer;
            font-size: 14px;
            background: rgb(81, 81, 202);
            padding: 10px 15px;
            color: #ffff;
            transition: 0.3s ease;
        }
        button:hover{
            background: #1e40af;
        }
        #taskList{
            list-style: none;
            margin-top: 25px;
            padding: 0;
        }
        li{
            background: #f9fafb;
            margin-bottom: 10px;
            padding: 10px;
            align-items: center;
            word-break: break-all;
            justify-content: space-between;
            display: flex;
            border-radius: 5px;
        }
        .task-test{
            cursor: pointer;
            flex: 1;
        }
        .completed{
            text-decoration: line-through;
            color: gray;
        }
        .deleteBtn{
            display: flex;
            padding: 10px;
            margin-left: 10px;
            background: rgb(197, 34, 34);
        }
        .deleteBtn:hover{
            background: #b91c1c;
            box-shadow: none;
        }
        @media(max-width:500px){
            body{
                padding: 20px 15px;
            }
            .container{
                padding: 20px;
            }
            button{
                font-size: 14px;
                padding: 8px 10px;
            }
        }
    </style>
</head>
<body>
   <div class="container">
    <h1>My To Do List</h1>
    <div class="group-input">
        <input type="text" id="input of task" placeholder="Input a new task">
        <button onclick="addTask()">Add</button>
    </div>
    <ul id="taskList"></ul>
   </div> 
   <script>
    let tasks = JSON.parse(localStorage,get.Item('tasks'))||[];
    function saveTasks(){
        localStorage.setItem('tasks',JSON.stringify(tasks));
    }
    function renderTasks(){
        const taskList= document.getElementById('taskList');
        taskList.innerHTML = ""

        tasks.forEach((task,index) =>{
            const li = document.createElement('li');

            const span = document.createElement('span')
            span.textContent = task.test;
            span.className = 'task-test';
            if (task,completed){
                span.classList.add('completed');
            }
            span.onclick =()=>{
                tasks[index].completed =! tasks[index].completed;
                saveTasks();
                renderTasks();
            };
            const deleteBtn = document.createElement('button');
            deleteBtn.textContent= 'Delete';
            deleteBtn.className ='delete-btn';
            deleteBtn.onclick =()=> {
                 li.remove();
                tasks.splice(index,1);
                saveTasks();
                renderTasks();
            };
            li.appendChild(span);
            li.appendChild(deleteBtn);
            taskList.appendChild(li);
        });
    }

    function addTask(){
        const input = document.getElementById('input of task');
        const text=input.value.trim();

        if(text==="") return; //when the text is strictly equal to the inputed value or variable, then return
        tasks.push({
            text:text,
            completed:false
        });
        input.value=""
        saveTasks();
        renderTasks();
    }
    renderTasks();
   </script>
</body>
</html>
